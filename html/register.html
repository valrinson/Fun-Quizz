<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="QuizRank Challenge - Test your knowledge and compete on the leaderboard.">

    <title>QuizRank Quiz</title>

    <link rel="stylesheet" href="../css/style.css">

</head>
<body>
<div class="container">

    <h2>🚀 QuizRank Register</h2>

    <form id="registerForm">

        <input
            type="text"
            id="username"
            placeholder="Enter Username"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have an account?
        <a href="index.html">Login</a>
    </p>

</div>

<script src="../js/register.js"></script>

</body>
</html>
