<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="QuizRank Challenge - Test your knowledge and compete on the leaderboard.">

    <title>QuizRank Quiz</title>

    <link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="result-card">

    <h1>🎉 Quiz Completed!</h1>

    <div class="score-circle" id="percentage">
        0%
    </div>

    <div class="stats">

        <div class="stat-box">
            <h3>Total</h3>
            <p id="total">25</p>
        </div>

        <div class="stat-box">
            <h3>Correct</h3>
            <p id="correct">0</p>
        </div>

        <div class="stat-box">
            <h3>Wrong</h3>
            <p id="wrong">0</p>
        </div>

    </div>

    <button
        class="result-btn"
        onclick="window.location.href='quiz.html'">
        🔄 Play Again
    </button>

</div>

<script src="js/result.js"></script>

</body>
</html>
